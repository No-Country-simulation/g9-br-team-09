# Oracle Autonomous Database via JDBC Thin + TLS sem wallet.
# DB_URL, DB_USERNAME e DB_PASSWORD devem ser fornecidos externamente.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.connect-retries=${DB_CONNECT_RETRIES:5}

# HikariCP
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}
spring.datasource.hikari.keepalive-time=${DB_KEEPALIVE_TIME_MS:120000}

# Evita que componentes de infraestrutura registrem a URL JDBC completa.
logging.level.org.flywaydb=WARN
logging.level.org.hibernate.orm.connections.pooling=WARN
